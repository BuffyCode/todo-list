<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TO DO LIST</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <div class="todo-app">
        <h2>To-Do List<img src="images/icon.png"/>
          <button id="setTheme">🌙 Dark Mode</button>
        </h2>
        <div class="row">
          <input type="text" id="input-box" placeholder="Add Your Task" maxlength="80">
          <button onclick="addTask()">Add</button>
        </div>
        <p id="char-counter">80 characters remaining</p>
        <ul id="list-container">
        </ul>
        <p id="empty-msg">No tasks yet - add one above !</p>
        <p id="task-counter"></p>
        <button id="clear-all" onclick="clearAll()">Clear All</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
